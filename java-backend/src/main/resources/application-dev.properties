# Local Development Settings (H2 In-Memory Database)
spring.datasource.url=jdbc:h2:mem:jobtracker;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect

# Enable H2 Console
spring.mail.properties.mail.smtp.starttls.enable=true

# Gemini AI Configuration
gemini.api.key=your_gemini_api_key_here
spring.h2.console.enabled=true
spring.h2.console.path=/h2-console

# Show SQL for easier debugging locally
spring.jpa.show-sql=true
spring.jpa.hibernate.ddl-auto=update

# No need to exclude mail configuration here if we want to test it, 
# but keeping it simple for now to avoid other errors.
# Strict Email Verification (False for local dev)
app.email.strict=false

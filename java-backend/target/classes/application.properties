server.port=${PORT:8080}
spring.datasource.url=jdbc:h2:mem:jobtracker;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect



spring.jpa.hibernate.ddl-auto=update



spring.jpa.show-sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect


# Mail properties
spring.mail.host=smtp.gmail.com
spring.mail.port=465
# Mail properties (FILL THESE TO SEND REAL EMAILS)
spring.mail.username=${MAIL_USER:dummy}
spring.mail.password=${MAIL_PASSWORD:dummy}

spring.mail.properties.mail.smtp.auth=true
spring.mail.properties.mail.smtp.ssl.enable=true
spring.mail.properties.mail.smtp.socketFactory.port=465
spring.mail.properties.mail.smtp.socketFactory.class=javax.net.ssl.SSLSocketFactory
spring.mail.properties.mail.smtp.socketFactory.fallback=false
spring.mail.properties.mail.debug=true



# Gemini AI configuration

gemini.api.key=${GEMINI_API_KEY:dummy_key}
